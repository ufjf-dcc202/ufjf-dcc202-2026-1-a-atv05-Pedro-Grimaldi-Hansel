<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Página Básica</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #f5f5f5;
			color: #222;
		}

		main {
			max-width: 600px;
			margin: 60px auto;
			padding: 24px;
			background: #fff;
			border-radius: 10px;
			box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
			text-align: center;
		}

		h1 {
			margin-top: 0;
		}

		button {
			margin-top: 16px;
			padding: 10px 16px;
			border: none;
			border-radius: 8px;
			background: #0a66c2;
			color: white;
			cursor: pointer;
		}

		button:hover {
			background: #084c91;
		}
	</style>
</head>
<body>
	<main>
		<h1>Olá, mundo!</h1>
		<p>Esta é uma página web bem básica em HTML, CSS e JavaScript.</p>
		<button id="acao">Clique aqui</button>
		<p id="mensagem"></p>
	</main>

	<script>
		const botao = document.getElementById("acao");
		const mensagem = document.getElementById("mensagem");

		botao.addEventListener("click", () => {
			mensagem.textContent = "Você clicou no botão!";
		});
	</script>
</body>
</html>
