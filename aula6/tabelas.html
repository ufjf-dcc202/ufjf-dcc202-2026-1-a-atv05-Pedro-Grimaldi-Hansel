<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
</head>
<body>
  <main class="container">
    <h1>Exemplo de Tabela</h1>
    <p>
      Esta tabela mostra um exemplo simples de organizacao de dados de estudantes e suas notas.
    </p>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Disciplina</th>
          <th>Nota</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Ana</td>
          <td>Programacao Web</td>
          <td>9.0</td>
        </tr>
        <tr>
          <td>Bruno</td>
          <td>Estruturas de Dados</td>
          <td>8.5</td>
        </tr>
        <tr>
          <td>Carla</td>
          <td>Banco de Dados</td>
          <td>9.3</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
